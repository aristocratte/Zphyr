name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve SPM packages
        run: xcodebuild -resolvePackageDependencies -project Zphyr.xcodeproj -scheme Zphyr

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project Zphyr.xcodeproj \
            -scheme Zphyr \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

  test:
    name: Unit tests
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Resolve SPM packages
        run: xcodebuild -resolvePackageDependencies -project Zphyr.xcodeproj -scheme Zphyr

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Zphyr.xcodeproj \
            -scheme Zphyr \
            -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:ZphyrTests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
